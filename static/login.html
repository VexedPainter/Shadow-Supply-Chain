<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowSync — Secure Login</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300234B'/><text y='.9em' x='18' font-size='70'>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #000e24 0%, #001a3d 40%, #00234b 100%);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* Ambient glow orbs */
        body::before {
            content: '';
            position: fixed; top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 106, 106, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed; bottom: -150px; right: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 191, 0, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-container {
            width: 100%; max-width: 440px; padding: 44px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
            position: relative; z-index: 1;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .login-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #006a6a, #008a8a);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: #fff; margin: 0 auto 24px;
            font-family: 'Manrope', sans-serif;
            box-shadow: 0 0 30px rgba(0, 106, 106, 0.3);
        }
        .login-header { text-align: center; margin-bottom: 36px; }
        .login-header h2 {
            font-size: 26px; margin-bottom: 8px; letter-spacing: -0.02em;
            font-family: 'Manrope', sans-serif; font-weight: 800; color: #fff;
        }
        .login-header p { color: rgba(255, 255, 255, 0.45); font-size: 13px; }
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block; font-size: 11px; font-weight: 600;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .form-group input { 
            width: 100%; padding: 13px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff; font-family: 'Inter', sans-serif; font-size: 14px;
            transition: all 0.2s ease;
        }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.25); }
        .form-group input:focus {
            outline: none;
            border-color: #006a6a;
            box-shadow: 0 0 0 4px rgba(0, 106, 106, 0.15);
        }
        .login-btn { 
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #006a6a, #008a8a);
            color: #fff; border: none; border-radius: 12px; font-weight: 700;
            font-size: 13px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 106, 106, 0.3); margin-top: 8px;
            text-transform: uppercase; letter-spacing: 0.05em;
            font-family: 'Inter', sans-serif;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
            box-shadow: 0 8px 28px rgba(0, 106, 106, 0.4);
        }
        .login-btn:active { transform: translateY(0) scale(0.98); }
        .err-msg {
            color: #ffdad6; font-size: 12px; text-align: center;
            margin-top: 16px; display: none;
            background: rgba(186, 26, 26, 0.15);
            padding: 10px; border-radius: 8px;
        }
        .footer-text {
            margin-top: 28px; text-align: center;
            font-size: 10px; color: rgba(255, 255, 255, 0.25);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">SS</div>
        <div class="login-header">
            <h2>ShadowSync</h2>
            <p>Kinetic Ledger · Authorized Access Only</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Identifier</label>
                <input type="text" id="username" placeholder="Enter your business ID" required value="admin">
            </div>
            <div class="form-group">
                <label>Passcode</label>
                <input type="password" id="password" placeholder="Enter secure key" required value="nexus2026">
            </div>
            <button type="submit" class="login-btn">Secure Access</button>
            <div id="errorMessage" class="err-msg">Authorization failed. Please verify credentials.</div>
        </form>
        <div class="footer-text">
            © 2026 ShadowSync · Kinetic Ledger v3.0<br>
            Supply Chain Intelligence Platform
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('errorMessage');
            btn.textContent = 'Verifying...';
            btn.disabled = true;
            err.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    localStorage.setItem('ss_token', data.token);
                    window.location.href = '/';
                } else {
                    throw new Error();
                }
            } catch (e) {
                err.style.display = 'block';
                btn.textContent = 'Secure Access';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
